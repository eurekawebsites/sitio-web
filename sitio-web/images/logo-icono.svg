<?xml version="1.0" encoding="UTF-8"?>
<!-- ICON · oscuro · transparent background · for use on dark/green backgrounds -->
<svg width="800" height="800" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg">

  <!-- Body -->
