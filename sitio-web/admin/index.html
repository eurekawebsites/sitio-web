<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coordenada Viajes — Administrador</title>
  <!-- Netlify Identity Widget (required for git-gateway login) -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <!-- Redirect confirmation tokens (email invite flow) to the admin panel -->
  <script>
    if (window.location.hash && window.location.hash.includes('confirmation_token')) {
      window.location.href = '/admin/' + window.location.hash;
    }
  </script>
</head>
<body>
  <!-- Decap CMS
       Docs: https://decapcms.org/docs/
       Requires: Netlify Identity + Git Gateway enabled in Netlify dashboard
       Dashboard → Site settings → Identity → Enable
       Dashboard → Site settings → Identity → Services → Git Gateway → Enable
  -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
