  <circle cx="400" cy="427" r="3.5" fill="none" stroke="#F8F5EE" stroke-width="2.5"/>

  <!-- Stickers -->
  <circle cx="320" cy="381" r="12" fill="none" stroke="#D4AF6A" stroke-width="2"/>
