<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aster Íñigo — Coordenada Viajes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { overflow-x: hidden; background: #F5F0E8; }
    a { color: inherit; text-decoration: none; }
    img { display: block; max-width: 100%; }

    :root {
      --green:  #2D5016;
      --dark:   #1e3a0f;
      --gold:   #C9A84C;
      --cream:  #F5F0E8;
      --muted:  rgba(248,245,238,0.55);
      --serif:  'EB Garamond', Georgia, serif;
      --sans:   Arial, Helvetica, sans-serif;
    }

    body {
      background: var(--cream);
      min-height: 100vh;
      padding: 20px 20px 24px;
      font-family: var(--sans);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* ── Card shell ── */
    .card {
      background: var(--green);
      color: var(--cream);
      width: 100%;
      max-width: 420px;
      margin-left: auto;
      margin-right: auto;
      border-radius: 4px;
      overflow: hidden;
      box-shadow: none;
    }

    /* ── Top band ── */
    .card-top {
      padding: 28px 32px 24px;
      text-align: center;
      border-bottom: 1px solid rgba(201,168,76,0.25);
    }

    .card-icon {
      width: 100px;
      height: auto;
      margin: 0 auto 18px;
    }

    .card-brand {
      font-family: var(--serif);
      font-size: 0.72rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .card-name {
      font-family: var(--serif);
      font-weight: 400;
      font-size: clamp(1.8rem, 7vw, 2.3rem);
      line-height: 1.1;
      color: var(--cream);
      margin-bottom: 6px;
    }

    .card-role {
      font-family: var(--sans);
      font-size: 0.68rem;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 14px;
    }

    .card-tagline {
      font-family: var(--serif);
      font-style: italic;
      font-size: 1rem;
      color: var(--cream);
      opacity: 0.85;
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .card-sub {
      font-family: var(--sans);
      font-size: 0.68rem;
      color: var(--muted);
      line-height: 1.5;
    }

    /* ── Services strip ── */
    .card-services {
      padding: 13px 20px;
      text-align: center;
      border-bottom: 1px solid rgba(201,168,76,0.25);
      border-top: 1px solid rgba(201,168,76,0.25);
      font-family: var(--sans);
      font-size: 0.65rem;
      letter-spacing: 0;
      text-transform: uppercase;
      color: var(--gold);
    }

    /* ── Contact buttons ── */
    .card-contact {
      padding: 18px 28px 22px;
      display: flex;
      flex-direction: column;
      gap: 9px;
      background: var(--cream);
    }

    .contact-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 16px;
      border-radius: 3px;
      font-family: var(--sans);
      font-size: 0.82rem;
      transition: opacity 0.18s ease;
      background: rgba(45,80,22,0.07);
      border: 1px solid rgba(45,80,22,0.15);
      color: var(--green);
    }

    .contact-btn:hover { opacity: 0.75; }

    .contact-btn-icon {
      width: 20px;
      height: 20px;
      flex-shrink: 0;
      opacity: 0.9;
    }

    .contact-btn-label {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .contact-btn-type {
      font-size: 0.62rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
    }

    .contact-btn-value {
      font-family: var(--serif);
      font-size: 0.95rem;
      color: var(--green);
    }

    /* ── Corner bracket accents (decorative) ── */
    .card-top {
      position: relative;
    }

    .bracket {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: var(--gold);
      border-style: solid;
      opacity: 0.5;
    }

    .bracket--tl { top: 10px; left: 10px; border-width: 2px 0 0 2px; }
    .bracket--tr { top: 10px; right: 10px; border-width: 2px 2px 0 0; }
    .bracket--bl { bottom: 10px; left: 10px; border-width: 0 0 2px 2px; }
    .bracket--br { bottom: 10px; right: 10px; border-width: 0 2px 2px 0; }
  </style>
</head>
